<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>JAK Sprint Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1 id="company"></h1>

<div class="card">

<h2 id="sprint"></h2>

<div id="progressText"></div>

<progress id="progress" max="100"></progress>

<div class="dates">

<div>
<b>Start</b>
<p id="start"></p>
</div>

<div>
<b>End</b>
<p id="end"></p>
</div>

<div>
<b>Next Sprint</b>
<p id="next"></p>
</div>

</div>

</div>

<div class="grid">

<div class="card">
<h3>🔥 Priorities</h3>
<ul id="priorities"></ul>
</div>

<div class="card">
<h3>📦 Projects</h3>
<ul id="projects"></ul>
</div>

<div class="card">
<h3>📅 Milestones</h3>
<ul id="milestones"></ul>
</div>

<div class="card">
<h3>📆 Meetings</h3>
<ul id="meetings"></ul>
</div>

<div class="card">
<h3>👥 Team</h3>
<ul id="team"></ul>
</div>

<div class="card">
<h3>💡 Rule of the Day</h3>
<p id="rule"></p>
</div>

</div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
