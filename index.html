<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>JAK Technologies | Engineering Dashboard</title>

    <link rel="stylesheet" href="style.css" />

</head>

<body>

    <div class="container">

        <!-- Header -->

        <header class="header">

            <div>

                <h1 id="company"></h1>

                <p class="subtitle">Engineering Sprint Dashboard</p>

            </div>

            <div class="clock-panel">

                <div id="today"></div>

                <div id="clock"></div>

            </div>

        </header>

        <!-- Sprint Overview -->

        <section class="card sprint-card">

            <div class="left">

                <h2 id="sprint"></h2>

                <p id="progressText"></p>

                <progress id="progress" max="100"></progress>

            </div>

            <div class="right">

                <div class="date-box">

                    <span>Start</span>

                    <strong id="start"></strong>

                </div>

                <div class="date-box">

                    <span>End</span>

                    <strong id="end"></strong>

                </div>

                <div class="date-box">

                    <span>Next Sprint</span>

                    <strong id="next"></strong>

                </div>

            </div>

        </section>

        <!-- Main Dashboard -->

        <div class="dashboard">

            <!-- Priorities -->

            <section class="card">

                <div class="card-title">

                    🔥 Current Priorities

                </div>

                <ul id="priorities"></ul>

            </section>

            <!-- Projects -->

            <section class="card">

                <div class="card-title">

                    📦 Projects

                </div>

                <ul id="projects"></ul>

            </section>

            <!-- Milestones -->

            <section class="card">

                <div class="card-title">

                    📅 Upcoming Milestones

                </div>

                <ul id="milestones"></ul>

            </section>

            <!-- Meetings -->

            <section class="card">

                <div class="card-title">

                    🤝 Meetings

                </div>

                <ul id="meetings"></ul>

            </section>

            <!-- Team -->

            <section class="card">

                <div class="card-title">

                    👥 Team

                </div>

                <div id="team" class="team-grid"></div>

            </section>

            <!-- Today's Focus -->

            <section class="card">

                <div class="card-title">

                    🎯 Today's Focus

                </div>

                <div id="focus" class="focus-box"></div>

            </section>

            <!-- Engineering Rule -->

            <section class="card rule-card">

                <div class="card-title">

                    💡 Engineering Rule

                </div>

                <div id="rule"></div>

            </section>

        </div>

        <!-- Footer -->

        <footer>

            <span>

                Engineering Handbook • GitHub Projects • CI/CD • Design First

            </span>

        </footer>

    </div>

    <script src="data.js"></script>

    <script src="script.js"></script>

</body>

</html>
